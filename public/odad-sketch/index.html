<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ODAD Sketch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
    #p5-container { width: 100%; height: 100%; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body>
  <div id="p5-container"></div>
  <script>
    // Configuration Constants
    const COLORS = {
      SDblue: '#0064FF',
      SDred: '#FF4132',
      SDyellow: '#ffe600'
    };

    // Names for each color (hard-coded)
    const NAME_BLUE = "aeiou";
    const NAME_RED = "aaeei";
    const NAME_YELLOW = "aaeee";

    // State variables for graphics and noise
    const noiseOffsets = {
      blue: { x: Array(9).fill().map((_, i) => i * 100 + Math.random() * 1000), y: Array(9).fill().map((_, i) => i * 1000 + Math.random() * 1000) },
      red: { x: Array(9).fill().map((_, i) => i * 200 + Math.random() * 1000), y: Array(9).fill().map((_, i) => i * 2000 + Math.random() * 1000) },
      yellow: { x: Array(9).fill().map((_, i) => i * 300 + Math.random() * 1000), y: Array(9).fill().map((_, i) => i * 3000 + Math.random() * 1000) }
    };
    const bigSizes = [0, 150, 250, 450, 650, 850];
    const increment = 0.0015;

    function setup() {
      const canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent("p5-container");
      background(30);
    }

    function draw() {
      background(30, 10);
      generateCircles(NAME_BLUE, COLORS.SDblue, noiseOffsets.blue);
      generateCircles(NAME_RED, COLORS.SDred, noiseOffsets.red);
      generateCircles(NAME_YELLOW, COLORS.SDyellow, noiseOffsets.yellow);
    }

    function generateCircles(name, color, noiseOffset) {
      const vowelCounts = countVowels(name);
      const activeDots = vowelCounts.filter(count => count > 0).length;

      blendMode(LIGHTEST);

      for (let i = 0; i < activeDots; i++) {
        noiseOffset.x[i] += increment + i * 0.001;
        noiseOffset.y[i] += increment + i * 0.001;

        const x = map(noise(noiseOffset.x[i]), 0, 1, 0, width);
        const y = map(noise(noiseOffset.y[i]), 0, 1, 0, height);
        const size = bigSizes[vowelCounts[i]];

        displayDot(x, y, size, color);
      }

      blendMode(BLEND);
    }

    function countVowels(name) {
      const lowerCaseName = name.toLowerCase();
      const vowels = ['a', 'e', 'i', 'o', 'u'];
      return vowels.map(vowel => lowerCaseName.split(vowel).length - 1);
    }

    function displayDot(x, y, size, color) {
      noStroke();
      fill(color);
      circle(x, y, size);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
